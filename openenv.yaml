spec_version: 1

name: email-triage-env
display_name: "Email Triage Environment"
description: >
  A real-world OpenEnv environment where an AI agent learns to triage emails
  by assigning priority (urgent/normal/low), category (billing, HR, legal, etc.),
  and routing them to the correct team. Features 3 difficulty levels with
  partial-credit reward signals, secondary intent penalties, and multi-intent
  email handling.

version: "1.0.0"
author: "Code Catalyst"
license: "MIT"

type: http

runtime:
  language: python
  python_version: "3.11"
  install: pip install -r requirements.txt

app:
  module: main
  object: app
  port: 7860

tasks:
  - id: easy_triage
    description: "Triage emails with clear, explicit signals. Unambiguous priority, category, and routing."
    difficulty: easy
    max_steps: 5
    reward_range: [0.0, 1.0]

  - id: medium_triage
    description: "Triage emails with implicit urgency and overlapping categories. Requires reading between the lines."
    difficulty: medium
    max_steps: 5
    reward_range: [0.0, 1.0]

  - id: hard_triage
    description: "Triage complex multi-intent emails including legal/compliance edge cases, churn signals, and fraud reports."
    difficulty: hard
    max_steps: 5
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  fields:
    email_id:    {type: string}
    subject:     {type: string}
    body:        {type: string}
    sender:      {type: string}
    timestamp:   {type: string, format: iso8601}
    difficulty:  {type: string, enum: [easy, medium, hard]}
    task_id:     {type: string}
    instruction: {type: string}

action_space:
  type: object
  fields:
    priority:
      type: string
      enum: [urgent, normal, low]
      required: true
    category:
      type: string
      enum: [billing, technical_support, sales, hr, product_feedback, legal_compliance, other]
      required: true
    route:
      type: string
      enum: [billing_support, tier1_support, tier2_support, engineering_escalation,
             sales_team, sales_engineering, hr_recruitment, product_team,
             customer_success, customer_retention, legal_team, compliance_team,
             data_privacy_officer, partnerships_team]
      required: true
    secondary_category:
      type: string
      required: false
    secondary_route:
      type: string
      required: false
    reasoning:
      type: string
      required: false

reward:
  range: [0.0, 1.0]
  partial_credit: true
  description: >
    Reward is computed per-field:
      priority  correct → +0.35
      category  correct → +0.35
      route     correct → +0.30
      secondary intent caught (hard tasks) → up to +0.10 bonus
      secondary intent ignored (ground truth exists, agent gave None) → -0.05 penalty
      secondary intent wrong (agent guessed incorrectly) → -0.02 penalty
    Multiple acceptable routes exist for medium/hard tasks.
    Total reward is clamped to [0.0, 1.0].

endpoints:
  health: GET /health
  reset:  POST /reset
  step:   POST /step
  state:  GET /state
  tasks:  GET /tasks

docker:
  base_image: "python:3.11-slim"
  port: 7860
